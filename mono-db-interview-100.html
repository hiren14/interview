<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB 100-Question Master Practice Bank</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));

        :root {
            --paper: #FAF7F1;
            --paper-line: #E7E0D3;
            --ink: #2B2620;
        }

        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: var(--paper);
            background-image:
                linear-gradient(var(--paper-line) 1px, transparent 1px);
            background-size: 100% 2.1rem;
        }
        .dark body {
            background-color: #0F1417;
            background-image: linear-gradient(#1C2226 1px, transparent 1px);
            background-size: 100% 2.1rem;
        }

        /* Custom smooth scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbbfa3; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #3a4650; }
        ::-webkit-scrollbar-thumb:hover { background: #b0a184; }

        /* Card catalog punch hole + tab */
        .catalog-hole {
            width: 10px; height: 10px; border-radius: 9999px;
            background: var(--paper);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.25);
            border: 1px solid var(--paper-line);
        }
        .dark .catalog-hole {
            background: #0F1417;
            border-color: #2A3339;
        }

        .catalog-card {
            background: #FFFDF9;
            border: 1px solid var(--paper-line);
        }
        .dark .catalog-card {
            background: #151B1F;
            border-color: #263038;
        }

        .terminal-box {
            background: #1B1F1C;
            color: #B9F6C4;
        }

        @keyframes unfold {
            from { opacity: 0; transform: translateY(-6px) scaleY(0.96); transform-origin: top; }
            to { opacity: 1; transform: translateY(0) scaleY(1); transform-origin: top; }
        }
        .animate-unfold { animation: unfold 0.22s ease-out; }

        @media (prefers-reduced-motion: reduce) {
            .animate-unfold { animation: none; }
        }

        button:focus-visible, input:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="text-[var(--ink)] dark:text-slate-200 antialiased min-h-screen pb-16 transition-colors duration-200">

    <header class="bg-[#FFFDF9]/90 dark:bg-[#10151A]/90 backdrop-blur-sm border-b border-[var(--paper-line)] dark:border-[#263038] sticky top-0 z-50 transition-colors duration-200">
        <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
            <div>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase text-emerald-700 dark:text-emerald-400 mb-1">Study Deck · Reference Catalog</p>
                <h1 id="page-title" class="font-display text-3xl font-semibold text-[var(--ink)] dark:text-white tracking-tight"></h1>
                <p id="page-level" class="text-sm text-slate-500 dark:text-slate-400 mt-1"></p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="relative flex-1 sm:w-64">
                    <input type="text" id="search-input" oninput="filterQuestions()" placeholder="Search the catalog..."
                        class="w-full pl-9 pr-4 py-2 text-sm bg-[var(--paper)] dark:bg-[#0F1417] border border-[var(--paper-line)] dark:border-[#263038] rounded-md text-[var(--ink)] dark:text-white focus:outline-hidden focus:border-emerald-600 transition-all font-mono">
                    <span class="absolute left-3 top-2.5 text-slate-400 text-xs">🔍</span>
                </div>
                <button onclick="toggleTheme()" class="p-2 bg-[var(--paper)] dark:bg-[#0F1417] border border-[var(--paper-line)] dark:border-[#263038] rounded-md hover:brightness-95 dark:hover:brightness-125 transition-all cursor-pointer select-none" title="Toggle Theme" aria-label="Toggle light and dark theme">
                    <span id="theme-icon" class="text-base">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="flex flex-col md:flex-row gap-4 md:items-stretch mb-8">
            <div class="catalog-card rounded-xl px-5 py-4 flex-1 shadow-xs relative overflow-hidden">
                <span class="absolute top-3 right-3 catalog-hole"></span>
                <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1">Field Notes</p>
                <p id="page-instructions" class="text-sm text-[var(--ink)] dark:text-slate-300 leading-relaxed"></p>
            </div>
            <div class="catalog-card rounded-xl px-5 py-4 flex items-center gap-6 shadow-xs">
                <div>
                    <p id="stat-total" class="font-display text-2xl font-semibold text-[var(--ink)] dark:text-white">0</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Entries</p>
                </div>
                <div class="w-px h-9 bg-[var(--paper-line)] dark:bg-[#263038]"></div>
                <div>
                    <p id="stat-topics" class="font-display text-2xl font-semibold text-[var(--ink)] dark:text-white">0</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Topics</p>
                </div>
                <div class="w-px h-9 bg-[var(--paper-line)] dark:bg-[#263038]"></div>
                <div>
                    <p id="stat-reviewed" class="font-display text-2xl font-semibold text-emerald-700 dark:text-emerald-400">0</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Reviewed</p>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="font-mono text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 block mb-2">Browse by Topic</label>
            <div id="topic-filters" class="flex flex-wrap gap-2">
                <button onclick="selectTopic('all')" id="tab-all" class="px-3 py-1.5 text-xs font-semibold rounded-md bg-[var(--ink)] dark:bg-emerald-600 text-white shadow-xs transition-all cursor-pointer font-mono">
                    ALL
                </button>
            </div>
        </div>

        <div class="text-xs font-mono text-slate-400 dark:text-slate-500 mb-4" id="stats-counter">
            Showing 0 records
        </div>

        <div id="questions-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>

        <div id="empty-state" class="hidden text-center py-16">
            <p class="font-display text-xl text-slate-400 dark:text-slate-600 mb-1">No matching records</p>
            <p class="text-sm text-slate-400 dark:text-slate-600 font-mono">try a different topic or search term</p>
        </div>

        <footer class="mt-16 pt-6 border-t border-[var(--paper-line)] dark:border-[#263038] text-center">
            <p class="font-mono text-[11px] text-slate-400 dark:text-slate-600 tracking-wide">indexed for interview prep · db.questions.find()</p>
        </footer>
    </main>

    <script>
        // Your Master JSON Data
        const dataBank = {
  "title": "MongoDB 100-Question Master Practice Bank",
  "level": "Covers all major topics for 2-3 yrs backend experience interviews",
  "topics_covered": [
    "CRUD",
    "Indexing",
    "Schema Design",
    "Aggregation",
    "Transactions",
    "Sharding",
    "Replication",
    "Performance"
  ],
  "instructions": "Organized by topic in blocks of ~10-20. Try answering first, then check. Ask me by topic or id to review in small batches and save tokens.",
  "questions": [
    {
      "id": 1,
      "topic": "CRUD",
      "difficulty": "easy",
      "question": "What's the difference between find() and findOne()?",
      "answer": "find() returns a cursor to multiple matching documents (lazy-loaded, iterable). findOne() returns a single document directly (or null), internally equivalent to find().limit(1) but returns the object itself, not a cursor."
    },
    {
      "id": 2,
      "topic": "CRUD",
      "difficulty": "easy",
      "question": "Difference between updateOne, updateMany, replaceOne?",
      "answer": "updateOne/updateMany apply update operators ($set,$inc,etc.) to matched doc(s), merging changes. replaceOne fully overwrites the matched document's content (except _id) with a new document -- no merge, whole document replaced."
    },
    {
      "id": 3,
      "topic": "CRUD",
      "difficulty": "easy",
      "question": "What does upsert:true do in an update operation?",
      "answer": "If no document matches the filter, upsert:true causes MongoDB to insert a new document combining the filter fields and the update fields, instead of doing nothing."
    },
    {
      "id": 4,
      "topic": "CRUD",
      "difficulty": "easy",
      "question": "Difference between deleteOne and remove (deprecated)?",
      "answer": "deleteOne removes exactly one matching document. The old remove() method (deprecated in newer drivers) could delete multiple by default unless justOne:true was passed -- deleteOne/deleteMany are the clearer modern replacements."
    },
    {
      "id": 5,
      "topic": "CRUD",
      "difficulty": "medium",
      "question": "How do you atomically increment a field and return the updated document in one call?",
      "answer": "Use findOneAndUpdate() with $inc and returnDocument:'after' (or new:true in older driver syntax). This does the increment and returns the updated doc atomically in a single round trip, avoiding read-then-write race conditions."
    },
    {
      "id": 6,
      "topic": "CRUD",
      "difficulty": "medium",
      "question": "What's the difference between $set and $setOnInsert?",
      "answer": "$set always sets the field's value on update/insert. $setOnInsert only applies the value when the operation results in an INSERT (via upsert), and is ignored if an existing document was matched/updated -- useful for setting a createdAt field only on first insert."
    },
    {
      "id": 7,
      "topic": "CRUD",
      "difficulty": "medium",
      "question": "How do you insert multiple documents efficiently, and what happens if one fails partway?",
      "answer": "Use insertMany(). By default (ordered:true), it stops at the first error and does not insert subsequent documents. With ordered:false, MongoDB attempts all inserts and reports which ones failed, continuing past errors -- faster but requires handling partial success."
    },
    {
      "id": 8,
      "topic": "CRUD",
      "difficulty": "medium",
      "question": "What does the projection {field:1} vs {field:0} do differently?",
      "answer": "Inclusion projection ({field:1}) returns ONLY the specified fields (plus _id unless excluded). Exclusion projection ({field:0}) returns all fields EXCEPT the specified ones. You generally cannot mix inclusion and exclusion in the same projection (except for _id)."
    },
    {
      "id": 9,
      "topic": "CRUD",
      "difficulty": "hard",
      "question": "How would you implement pagination efficiently for a large collection, and why is skip() problematic at scale?",
      "answer": "skip(n) still has to walk/scan n documents internally before returning results, making deep pagination (e.g., skip(1000000)) slow. Better approach: 'range-based'/cursor pagination -- use a sort field (e.g., _id or createdAt) and filter with $gt/$lt on the last seen value from the previous page, which uses the index directly regardless of page depth."
    },
    {
      "id": 10,
      "topic": "CRUD",
      "difficulty": "hard",
      "question": "What is a bulk write operation and when would you use it?",
      "answer": "bulkWrite() lets you batch multiple different operations (inserts, updates, deletes) into a single network round trip to the server. Useful for high-throughput batch processing (e.g., syncing thousands of records) since it drastically reduces round-trip overhead vs individual calls."
    },
    {
      "id": 11,
      "topic": "Indexing",
      "difficulty": "easy",
      "question": "What is the ESR rule for compound indexes?",
      "answer": "Equality, Sort, Range -- order compound index fields with equality-match fields first, sort fields second, range-filter fields last, for optimal index usage."
    },
    {
      "id": 12,
      "topic": "Indexing",
      "difficulty": "easy",
      "question": "What is a covered query?",
      "answer": "A query where all requested fields (filter + projection) exist within the index itself, so MongoDB never needs to fetch the full document from disk -- avoids the FETCH stage, much faster."
    },
    {
      "id": 13,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "What is a TTL index and a real use case?",
      "answer": "An index that auto-deletes documents N seconds after a date field's value. Use case: session tokens, OTPs, temporary carts that should self-expire without manual cleanup jobs."
    },
    {
      "id": 14,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "What is a partial index?",
      "answer": "An index that only includes documents matching a specified filter expression, rather than the entire collection -- reduces index size/write overhead when you only ever query a subset (e.g., active:true documents)."
    },
    {
      "id": 15,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "What is a sparse index?",
      "answer": "An index that only includes documents where the indexed field EXISTS, skipping documents missing that field entirely -- useful for optional fields to keep the index smaller."
    },
    {
      "id": 16,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "Difference between a sparse index and a partial index?",
      "answer": "Sparse only excludes documents missing the field. Partial can filter on ANY arbitrary condition (e.g., age > 21), giving more precise control -- MongoDB generally recommends partial indexes over sparse ones for most use cases now."
    },
    {
      "id": 17,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "What is a multikey index?",
      "answer": "An index created on a field that holds an array -- MongoDB automatically creates one index entry per array element, enabling queries to match any element within the array."
    },
    {
      "id": 18,
      "topic": "Indexing",
      "difficulty": "hard",
      "question": "Why can you not create a compound index with more than one array field?",
      "answer": "MongoDB would need to generate an index entry for every combination of elements across both arrays (a Cartesian product), which explodes the index size unpredictably and is disallowed to prevent this issue."
    },
    {
      "id": 19,
      "topic": "Indexing",
      "difficulty": "hard",
      "question": "What is index intersection and why doesn't Mongo always rely on it?",
      "answer": "MongoDB can use two separate single-field indexes together for a query with two conditions. It's usually less efficient than one purpose-built compound index though, since it requires scanning and intersecting two index structures -- the optimizer prefers a compound index if one exists."
    },
    {
      "id": 20,
      "topic": "Indexing",
      "difficulty": "hard",
      "question": "What's the difference between a wildcard index and creating individual indexes per field?",
      "answer": "A wildcard index ({'\\$**':1}) automatically indexes all fields (or a specified subset via wildcardProjection) without needing to predict field names in advance -- useful for schemas with dynamic/unpredictable fields, at the cost of larger index size and generally less optimal performance than a targeted compound index."
    },
    {
      "id": 21,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "How do you check if a query is actually using an index?",
      "answer": "Run .explain('executionStats') and check the winningPlan stage -- look for IXSCAN (index used) vs COLLSCAN (full collection scan, no index used)."
    },
    {
      "id": 22,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "What does background:true (or the newer default) mean when building an index?",
      "answer": "It means the index build doesn't hold an exclusive/blocking lock for the entire operation, letting reads/writes continue on the collection while the index is being built -- important for production systems with large collections where a blocking build would cause downtime."
    },
    {
      "id": 23,
      "topic": "Indexing",
      "difficulty": "hard",
      "question": "What happens to query performance if you create too many indexes on a collection?",
      "answer": "Each additional index adds write overhead (every insert/update/delete must also update all relevant indexes), increases storage/memory usage, and can slow down write-heavy workloads -- there's a tradeoff between read speed and write speed/storage cost."
    },
    {
      "id": 24,
      "topic": "Indexing",
      "difficulty": "medium",
      "question": "What is the difference between a unique index and a unique constraint via application code?",
      "answer": "A unique index is enforced at the database level -- MongoDB itself rejects any insert/update that would violate uniqueness, even under concurrent writes. Application-level checks (read-then-write) are prone to race conditions where two concurrent requests both pass the check before either writes."
    },
    {
      "id": 25,
      "topic": "Indexing",
      "difficulty": "hard",
      "question": "How would you design an index for a query that filters on 'category' (equality), sorts by 'rating' descending, and also filters 'price' with a range?",
      "answer": "{category:1, rating:-1, price:1} following ESR: category (equality) first, rating (sort) second, price (range) last -- lets MongoDB narrow by category, return already-sorted-by-rating results, and apply the price range filter last within that sorted-narrowed set."
    },
    {
      "id": 26,
      "topic": "Schema Design",
      "difficulty": "easy",
      "question": "When should you embed vs reference?",
      "answer": "Embed for 1-to-few relationships, data read together, doesn't grow unboundedly. Reference for 1-to-many/many-to-many, independently accessed data, or data that could exceed the 16MB document limit if embedded."
    },
    {
      "id": 27,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What is the Extended Reference Pattern?",
      "answer": "Duplicating a few frequently-needed fields (e.g., customerName, tier) alongside a reference/foreign key, so common reads don't require a $lookup/join -- tradeoff is needing to update duplicated fields if the source changes."
    },
    {
      "id": 28,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What is the Bucket Pattern and when is it used?",
      "answer": "Grouping multiple related readings/events (e.g., IoT sensor data) into a single document per time window instead of one doc per event -- reduces document count and index overhead for time-series-like data."
    },
    {
      "id": 29,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "What is the Outlier Pattern?",
      "answer": "Used when a small number of documents are extreme outliers (e.g. a viral post with millions of comments vs normal posts). Base doc has a flag like hasExtraData:true, and overflow is stored in a linked overflow document/collection -- keeps normal documents small while handling rare extreme cases separately."
    },
    {
      "id": 30,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What is the Subset Pattern?",
      "answer": "Embed only a SUBSET of related data (e.g., the 10 most recent reviews) directly in the parent document for fast common-case reads, while the full related dataset lives in a separate collection for less frequent full-list/pagination access."
    },
    {
      "id": 31,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "How do you model a many-to-many relationship, e.g. students and courses?",
      "answer": "Either two-way referencing (array of courseIds in student doc + array of studentIds in course doc), or a separate junction/'enrollments' collection with studentId+courseId pairs -- junction collection scales better and avoids unbounded arrays."
    },
    {
      "id": 32,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "What is schema versioning and why is it needed in MongoDB?",
      "answer": "Since MongoDB is schema-less, documents can drift in shape as the app evolves. Storing a schemaVersion field lets application code detect and handle/migrate old-format documents gracefully instead of assuming a single fixed shape across all documents."
    },
    {
      "id": 33,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "Why is denormalization more common in MongoDB schema design than in relational databases?",
      "answer": "MongoDB is optimized for read performance and avoiding joins; duplicating data across documents (denormalization) trades some write complexity/storage for much faster, simpler reads -- the opposite tradeoff emphasis from normalized relational design."
    },
    {
      "id": 34,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What's a potential downside of heavy denormalization?",
      "answer": "Data inconsistency risk -- if the same piece of information is duplicated across many documents, updating it requires updating every copy, and missing one leads to stale/inconsistent data across the system."
    },
    {
      "id": 35,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "How would you model a product catalog where products have highly variable attributes (e.g., a shirt has size/color, a laptop has RAM/CPU)?",
      "answer": "Use the Attribute Pattern: store variable attributes as an array of {key, value} pairs rather than fixed top-level fields, and create a single index on 'attributes.key' and 'attributes.value' -- avoids needing a huge number of sparse fields or a new index per possible attribute."
    },
    {
      "id": 36,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What is the Computed Pattern?",
      "answer": "Precomputing and storing the RESULT of an expensive calculation (e.g., total views, average rating) directly on a document, updated incrementally on writes, instead of recalculating it from scratch on every read -- trades some write cost for much cheaper reads."
    },
    {
      "id": 37,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "When migrating from a relational database to MongoDB, what's the biggest schema-design mindset shift?",
      "answer": "Moving from 'normalize everything, avoid duplication' to 'design around your application's query patterns first' -- in MongoDB you often duplicate/embed data specifically to make your most common queries fast and join-free, rather than optimizing purely for storage normalization."
    },
    {
      "id": 38,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What is the Polymorphic Pattern?",
      "answer": "Storing documents with different shapes/fields in the SAME collection when they share a common access pattern (e.g., different 'event' types in an events collection), often with a 'type' discriminator field so application code can branch on how to interpret each document."
    },
    {
      "id": 39,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "Why might you choose one large collection with a discriminator field over several smaller collections?",
      "answer": "If most queries need to access mixed types together (e.g., a unified activity feed mixing posts/comments/likes), one collection with a type field avoids running multiple queries and merging results in application code."
    },
    {
      "id": 40,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "What is the Approximation Pattern?",
      "answer": "Storing an approximate/cheaper-to-maintain value (e.g., an estimated view count updated only every N requests, or via probabilistic counting) instead of an exact real-time count, when perfect precision isn't required -- reduces write load significantly for high-frequency counters."
    },
    {
      "id": 41,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "How do you handle a 'likes' feature (millions of users could like a single post) without embedding an unbounded array in the post document?",
      "answer": "Store likes in a separate 'likes' collection with {postId, userId}, and maintain a denormalized likeCount on the post document (incremented via $inc) for fast display -- avoids the post document growing unboundedly."
    },
    {
      "id": 42,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "What is referential integrity in MongoDB, and how is it different from a relational DB?",
      "answer": "MongoDB does NOT enforce referential integrity automatically (no foreign key constraints) -- if you delete a customer, their referenced orders aren't automatically deleted or blocked. This must be handled at the application level or via a transaction if strict consistency is required."
    },
    {
      "id": 43,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "What is the Tree/Ancestor Array pattern for modeling hierarchical data like categories?",
      "answer": "Store an 'ancestors' array on each node containing all its parent IDs up the tree, enabling fast queries like 'find all descendants of X' or 'find the full path to root' via a single indexed array query, without recursive $graphLookup traversal."
    },
    {
      "id": 44,
      "topic": "Schema Design",
      "difficulty": "medium",
      "question": "Why is it usually a bad idea to use auto-incrementing integer _id values in a sharded MongoDB cluster?",
      "answer": "Sequential IDs cause all new inserts to target the same shard/chunk at any given time (similar to the ObjectId hot-shard problem), creating a write bottleneck instead of distributing load evenly across shards."
    },
    {
      "id": 45,
      "topic": "Schema Design",
      "difficulty": "hard",
      "question": "How would you design a schema for an e-commerce cart that needs to survive server restarts and support guest (non-logged-in) users?",
      "answer": "Store cart as its own document keyed by either userId (logged in) or a sessionId/guestId (guest), with a TTL index on guest carts to auto-expire abandoned ones, and a merge step to transfer session-cart items to the user-cart on login."
    },
    {
      "id": 46,
      "topic": "Aggregation",
      "difficulty": "easy",
      "question": "What does $match do and where should it typically be placed?",

                    <span class="absolute left-0 top-0 bottom-0 w-1.5 ${colors.tab}"></span>
                    <div class="p-5 flex-1">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <span class="w-1.5 h-1.5 rounded-full ${diffDot[q.difficulty] || 'bg-slate-400'}"></span>
                                <span class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">${q.difficulty}</span>
                            </div>
                            <span class="font-mono text-[10px] text-slate-300 dark:text-slate-600">No. ${String(q.id).padStart(3, '0')}</span>
                        </div>
                        <p class="font-mono text-[10px] uppercase tracking-widest ${colors.text} mb-1.5">${q.topic}</p>
                        <h3 class="font-display text-base font-medium text-[var(--ink)] dark:text-white leading-snug">
                            ${q.question}
                        </h3>
                    </div>

                    <div class="px-5 pb-5 pt-0">
                        <button onclick="toggleAnswer(${q.id})" class="text-xs font-semibold ${colors.text} hover:brightness-90 flex items-center gap-1.5 cursor-pointer select-none font-mono">
                            <span id="eye-icon-${q.id}">▸</span> <span id="btn-text-${q.id}">reveal</span>
                        </button>

                        <div id="answer-box-${q.id}" class="hidden mt-4 terminal-box text-xs p-3.5 rounded-lg leading-relaxed whitespace-pre-line font-mono">
<span class="text-slate-500">$</span> ${q.answer}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleAnswer(id) {
            const target = document.getElementById(`answer-box-${id}`);
            const text = document.getElementById(`btn-text-${id}`);
            const icon = document.getElementById(`eye-icon-${id}`);

            const isHidden = target.classList.contains('hidden') || target.style.display === 'none';

            if (isHidden) {
                target.classList.remove('hidden');
                target.style.display = 'block';
                target.classList.add('animate-unfold');
                text.innerText = "hide";
                icon.innerText = "▾";
                if (!reviewed.has(id)) {
                    reviewed.add(id);
                    document.getElementById('stat-reviewed').innerText = reviewed.size;
                }
            } else {
                target.style.display = 'none';
                text.innerText = "reveal";
                icon.innerText = "▸";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
