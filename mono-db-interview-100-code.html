<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB 100 Real-World Practice Problems</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));

        :root {
            --paper: #FAF7F1;
            --paper-line: #E7E0D3;
            --ink: #2B2620;
        }

        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: var(--paper);
            background-image:
                linear-gradient(var(--paper-line) 1px, transparent 1px);
            background-size: 100% 2.1rem;
        }
        .dark body {
            background-color: #0F1417;
            background-image: linear-gradient(#1C2226 1px, transparent 1px);
            background-size: 100% 2.1rem;
        }

        /* Custom smooth scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbbfa3; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #3a4650; }
        ::-webkit-scrollbar-thumb:hover { background: #b0a184; }

        /* Card catalog punch hole + tab */
        .catalog-hole {
            width: 10px; height: 10px; border-radius: 9999px;
            background: var(--paper);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.25);
            border: 1px solid var(--paper-line);
        }
        .dark .catalog-hole {
            background: #0F1417;
            border-color: #2A3339;
        }

        .catalog-card {
            background: #FFFDF9;
            border: 1px solid var(--paper-line);
        }
        .dark .catalog-card {
            background: #151B1F;
            border-color: #263038;
        }

        .terminal-box {
            background: #1B1F1C;
            color: #B9F6C4;
        }

        @keyframes unfold {
            from { opacity: 0; transform: translateY(-6px) scaleY(0.96); transform-origin: top; }
            to { opacity: 1; transform: translateY(0) scaleY(1); transform-origin: top; }
        }
        .animate-unfold { animation: unfold 0.22s ease-out; }

        @media (prefers-reduced-motion: reduce) {
            .animate-unfold { animation: none; }
        }

        button:focus-visible, input:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="text-[var(--ink)] dark:text-slate-200 antialiased min-h-screen pb-16 transition-colors duration-200">

    <header class="bg-[#FFFDF9]/90 dark:bg-[#10151A]/90 backdrop-blur-sm border-b border-[var(--paper-line)] dark:border-[#263038] sticky top-0 z-50 transition-colors duration-200">
        <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
            <div>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase text-emerald-700 dark:text-emerald-400 mb-1">Study Deck · Reference Catalog</p>
                <h1 id="page-title" class="font-display text-3xl font-semibold text-[var(--ink)] dark:text-white tracking-tight"></h1>
                <p id="page-level" class="text-sm text-slate-500 dark:text-slate-400 mt-1"></p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="relative flex-1 sm:w-64">
                    <input type="text" id="search-input" oninput="filterQuestions()" placeholder="Search the catalog..."
                        class="w-full pl-9 pr-4 py-2 text-sm bg-[var(--paper)] dark:bg-[#0F1417] border border-[var(--paper-line)] dark:border-[#263038] rounded-md text-[var(--ink)] dark:text-white focus:outline-hidden focus:border-emerald-600 transition-all font-mono">
                    <span class="absolute left-3 top-2.5 text-slate-400 text-xs">🔍</span>
                </div>
                <button onclick="toggleTheme()" class="p-2 bg-[var(--paper)] dark:bg-[#0F1417] border border-[var(--paper-line)] dark:border-[#263038] rounded-md hover:brightness-95 dark:hover:brightness-125 transition-all cursor-pointer select-none" title="Toggle Theme" aria-label="Toggle light and dark theme">
                    <span id="theme-icon" class="text-base">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="flex flex-col md:flex-row gap-4 md:items-stretch mb-8">
            <div class="catalog-card rounded-xl px-5 py-4 flex-1 shadow-xs relative overflow-hidden">
                <span class="absolute top-3 right-3 catalog-hole"></span>
                <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1">Field Notes</p>
                <p id="page-instructions" class="text-sm text-[var(--ink)] dark:text-slate-300 leading-relaxed"></p>
            </div>
            <div class="catalog-card rounded-xl px-5 py-4 flex items-center gap-6 shadow-xs">
                <div>
                    <p id="stat-total" class="font-display text-2xl font-semibold text-[var(--ink)] dark:text-white">0</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Entries</p>
                </div>
                <div class="w-px h-9 bg-[var(--paper-line)] dark:bg-[#263038]"></div>
                <div>
                    <p id="stat-topics" class="font-display text-2xl font-semibold text-[var(--ink)] dark:text-white">0</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Sections</p>
                </div>
                <div class="w-px h-9 bg-[var(--paper-line)] dark:bg-[#263038]"></div>
                <div>
                    <p id="stat-reviewed" class="font-display text-2xl font-semibold text-emerald-700 dark:text-emerald-400">0</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Reviewed</p>
                </div>
            </div>
        </div>

        <div class="mb-8">
            <label class="font-mono text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 block mb-2">Reference Schemas</label>
            <div id="schema-legend" class="flex flex-col gap-2"></div>
        </div>

        <div class="mb-6">
            <label class="font-mono text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 block mb-2">Browse by Section</label>
            <div id="topic-filters" class="flex flex-wrap gap-2">
                <button onclick="selectTopic('all')" id="tab-all" class="px-3 py-1.5 text-xs font-semibold rounded-md bg-[var(--ink)] dark:bg-emerald-600 text-white shadow-xs transition-all cursor-pointer font-mono">
                    ALL
                </button>
            </div>
        </div>

        <div class="text-xs font-mono text-slate-400 dark:text-slate-500 mb-4" id="stats-counter">
            Showing 0 records
        </div>

        <div id="questions-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>

        <div id="empty-state" class="hidden text-center py-16">
            <p class="font-display text-xl text-slate-400 dark:text-slate-600 mb-1">No matching records</p>
            <p class="text-sm text-slate-400 dark:text-slate-600 font-mono">try a different topic or search term</p>
        </div>

        <footer class="mt-16 pt-6 border-t border-[var(--paper-line)] dark:border-[#263038] text-center">
            <p class="font-mono text-[11px] text-slate-400 dark:text-slate-600 tracking-wide">indexed for interview prep · db.questions.find()</p>
        </footer>
    </main>

    <script>
        // Your Master JSON Data
        const dataBank = {
  "title": "MongoDB 100 Real-World Practice Problems (Scenario-Based)",
  "note": "Each problem gives a realistic schema + a task to solve yourself. Try writing the query/pipeline BEFORE checking the solution.",
  "sections": [
    "CRUD",
    "Indexing",
    "Aggregation",
    "Schema Design",
    "Transactions",
    "Performance"
  ],
  "sample_schemas": {
    "ecommerce": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
    "social_app": "Social app: users{_id,name,followers:[userId]}, posts{_id,userId,text,likes:[userId],createdAt}, comments{_id,postId,userId,text,createdAt}",
    "chat_app": "Chat app: conversations{_id,participantIds:[userId]}, messages{_id,conversationId,senderId,text,sentAt,readBy:[userId]}"
  },
  "problems": [
    {
      "id": 1,
      "section": "CRUD",
      "difficulty": "easy",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find all orders placed by customer 'C1' that are still pending.",
      "solution": "db.orders.find({ customerId: 'C1', status: 'pending' })",
      "explanation": "Simple equality filter on two fields -- straightforward find()."
    },
    {
      "id": 2,
      "section": "CRUD",
      "difficulty": "easy",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Update all pending orders older than 7 days to status 'cancelled'.",
      "solution": "db.orders.updateMany({ status: 'pending', orderDate: { $lt: new Date(Date.now()-7*24*60*60*1000) } }, { $set: { status: 'cancelled' } })",
      "explanation": "updateMany applies to all matching docs. Combine equality + date range in filter."
    },
    {
      "id": 3,
      "section": "CRUD",
      "difficulty": "easy",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Insert a new order only if it doesn't already exist for a given orderId (idempotent insert).",
      "solution": "db.orders.updateOne({ _id: 'ORD123' }, { $setOnInsert: { customerId:'C5', status:'pending', items:[], orderDate:new Date() } }, { upsert: true })",
      "explanation": "$setOnInsert with upsert:true ensures the fields are only applied on a fresh insert, making repeated calls with the same _id idempotent (no duplicate/overwrite on retry)."
    },
    {
      "id": 4,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Decrease product stock by 1 ONLY if stock > 0 (prevent negative stock in a race condition).",
      "solution": "db.products.updateOne({ _id: 'P1', stock: { $gt: 0 } }, { $inc: { stock: -1 } })",
      "explanation": "The condition stock:{$gt:0} is checked atomically as part of the single-document update -- if two requests race, only requests where the condition still holds when applied will succeed, preventing stock going negative."
    },
    {
      "id": 5,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Add a new item to an existing order's items array, but only if that productId isn't already in the array.",
      "solution": "db.orders.updateOne({ _id: 1, 'items.productId': { $ne: 'P9' } }, { $push: { items: { productId:'P9', qty:1, price:99 } } })",
      "explanation": "The filter 'items.productId':{$ne:'P9'} ensures the update only matches (and thus only pushes) if P9 isn't already present -- prevents duplicate line items."
    },
    {
      "id": 6,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Remove a specific item (by productId) from an order's items array.",
      "solution": "db.orders.updateOne({ _id: 1 }, { $pull: { items: { productId: 'P2' } } })",
      "explanation": "$pull removes all array elements matching the given condition from the specified array field."
    },
    {
      "id": 7,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "Social app: users{_id,name,followers:[userId]}, posts{_id,userId,text,likes:[userId],createdAt}, comments{_id,postId,userId,text,createdAt}",
      "task": "Add a follower to a user, avoiding duplicates.",
      "solution": "db.users.updateOne({ _id: 'U1' }, { $addToSet: { followers: 'U2' } })",
      "explanation": "$addToSet only adds the value if it's not already present in the array -- unlike $push, which would add a duplicate."
    },
    {
      "id": 8,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "Social app: users{_id,name,followers:[userId]}, posts{_id,userId,text,likes:[userId],createdAt}, comments{_id,postId,userId,text,createdAt}",
      "task": "Toggle a like on a post: if user already liked it, unlike; otherwise, like it. Write the logic (2 possible ops).",
      "solution": "// check first, then: \n db.posts.updateOne({_id:'P1', likes:'U2'}, {$pull:{likes:'U2'}}) \n // OR if not present: \n db.posts.updateOne({_id:'P1', likes:{$ne:'U2'}}, {$push:{likes:'U2'}})",
      "explanation": "Toggle logic requires checking membership first (read), then choosing pull vs push -- not atomic as a single operation since the desired outcome depends on current state. In high concurrency, consider a separate 'likes' collection with unique index on {postId,userId} and just insert/delete a document instead."
    },
    {
      "id": 9,
      "section": "CRUD",
      "difficulty": "hard",
      "scenario": "Chat app: conversations{_id,participantIds:[userId]}, messages{_id,conversationId,senderId,text,sentAt,readBy:[userId]}",
      "task": "Mark all unread messages in a conversation as read by a given user, without duplicating entries in readBy.",
      "solution": "db.messages.updateMany({ conversationId:'CV1', readBy: { $ne: 'U3' } }, { $addToSet: { readBy: 'U3' } })",
      "explanation": "Filtering readBy:{$ne:'U3'} avoids unnecessary writes to already-read messages; $addToSet prevents duplicate entries even without the filter, but combining both is more efficient (fewer documents touched)."
    },
    {
      "id": 10,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Rename the field 'orderDate' to 'placedAt' across the entire orders collection.",
      "solution": "db.orders.updateMany({}, { $rename: { orderDate: 'placedAt' } })",
      "explanation": "$rename changes a field's key while preserving its value, applied to all matching documents (empty filter = all documents)."
    },
    {
      "id": 11,
      "section": "CRUD",
      "difficulty": "hard",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find orders where the items array has MORE than 3 items.",
      "solution": "db.orders.find({ $expr: { $gt: [ { $size: '$items' }, 3 ] } })",
      "explanation": "$size returns array length but can only be used for EXACT match in a plain query ({items:{$size:3}} works for ==3). For >, <, etc. you need $expr with $size inside an aggregation-style expression."
    },
    {
      "id": 12,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find products with stock between 10 and 50 (inclusive).",
      "solution": "db.products.find({ stock: { $gte: 10, $lte: 50 } })",
      "explanation": "Combine $gte and $lte in the same field condition for an inclusive range."
    },
    {
      "id": 13,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "Social app: users{_id,name,followers:[userId]}, posts{_id,userId,text,likes:[userId],createdAt}, comments{_id,postId,userId,text,createdAt}",
      "task": "Find posts created in the last 24 hours, sorted newest first, limited to 20.",
      "solution": "db.posts.find({ createdAt: { $gte: new Date(Date.now()-24*60*60*1000) } }).sort({ createdAt: -1 }).limit(20)",
      "explanation": "Classic feed query pattern: range filter + sort + limit. Needs a compound index on createdAt (or with other equality filters preceding it) for performance."
    },
    {
      "id": 14,
      "section": "CRUD",
      "difficulty": "hard",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find all orders that contain AT LEAST one item with qty > 5.",
      "solution": "db.orders.find({ items: { $elemMatch: { qty: { $gt: 5 } } } })",
      "explanation": "$elemMatch ensures the condition (qty>5) is matched by a SINGLE array element -- without it, {'items.qty':{$gt:5}} would still work correctly for one condition, but $elemMatch becomes necessary when combining multiple conditions that must ALL be true on the same array element."
    },
    {
      "id": 15,
      "section": "CRUD",
      "difficulty": "hard",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find orders where a single item has qty > 5 AND price > 200 (both on the SAME item).",
      "solution": "db.orders.find({ items: { $elemMatch: { qty: { $gt: 5 }, price: { $gt: 200 } } } })",
      "explanation": "Without $elemMatch, {'items.qty':{$gt:5},'items.price':{$gt:200}} would match if ANY item has qty>5 and ANY (possibly different) item has price>200 -- $elemMatch forces both conditions onto the same array element."
    },
    {
      "id": 16,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find distinct cities among all customers.",
      "solution": "db.customers.distinct('city')",
      "explanation": "distinct() returns unique values for a given field across the collection (optionally with a filter as second argument)."
    },
    {
      "id": 17,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Count how many orders exist for customer 'C1' without loading the documents.",
      "solution": "db.orders.countDocuments({ customerId: 'C1' })",
      "explanation": "countDocuments() runs an aggregation internally and returns just the count -- more accurate than the deprecated count() and doesn't transfer full documents over the network."
    },
    {
      "id": 18,
      "section": "CRUD",
      "difficulty": "hard",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Find orders and return only the FIRST matching item from the items array (not all items) using the positional $ operator.",
      "solution": "db.orders.find({ 'items.productId': 'P1' }, { 'items.$': 1 })",
      "explanation": "The positional $ operator in a projection returns only the first array element that matched the query condition, not the whole items array -- useful to avoid pulling unrelated array elements."
    },
    {
      "id": 19,
      "section": "CRUD",
      "difficulty": "medium",
      "scenario": "Social app: users{_id,name,followers:[userId]}, posts{_id,userId,text,likes:[userId],createdAt}, comments{_id,postId,userId,text,createdAt}",
      "task": "Find users who have more than 1000 followers.",
      "solution": "db.users.find({ $expr: { $gt: [ { $size: '$followers' }, 1000 ] } })",
      "explanation": "Same pattern as Q11 -- $size only supports exact match in plain queries, so a range/threshold check needs $expr."
    },
    {
      "id": 20,
      "section": "CRUD",
      "difficulty": "hard",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Perform a bulk operation: cancel order 1, update stock for product P1, and insert a new audit log entry -- all in one round trip.",
      "solution": "db.orders.bulkWrite([ {updateOne:{filter:{_id:1},update:{$set:{status:'cancelled'}}}}, {updateOne:{filter:{_id:'P1'},update:{$inc:{stock:1}}}}, {insertOne:{document:{action:'cancel',orderId:1,at:new Date()}}} ])",
      "explanation": "bulkWrite batches heterogeneous operations (update, update, insert) into a single network round trip -- note these are NOT atomic together (no transaction) unless wrapped in a session/transaction."
    },
    {
      "id": 21,
      "section": "Indexing",
      "difficulty": "easy",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "You constantly query orders by customerId and sort by orderDate descending. Create the right index.",
      "solution": "db.orders.createIndex({ customerId: 1, orderDate: -1 })",
      "explanation": "Equality field (customerId) first, sort field (orderDate) second -- follows ESR, lets MongoDB fetch pre-sorted results for a given customer directly from the index."
    },
    {
      "id": 22,
      "section": "Indexing",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "A query filters status='delivered', city='Surat' (via a $lookup join field, not applicable here -- assume both on orders), and sorts by orderDate, with a range on totalValue. Design the index.",
      "solution": "db.orders.createIndex({ status: 1, orderDate: -1, totalValue: 1 })",
      "explanation": "ESR: status (equality) first, orderDate (sort) second, totalValue (range) last."
    },
    {
      "id": 23,
      "section": "Indexing",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Create an index that only indexes orders with status:'pending' (to keep the index small, since most orders are eventually delivered/cancelled).",
      "solution": "db.orders.createIndex({ orderDate: 1 }, { partialFilterExpression: { status: 'pending' } })",
      "explanation": "Partial index only includes documents matching the filter expression, keeping the index smaller and faster to maintain if most queries only care about pending orders."
    },
    {
      "id": 24,
      "section": "Indexing",
      "difficulty": "medium",
      "scenario": "E-commerce: orders{_id,customerId,status,items:[{productId,qty,price}],orderDate}, customers{_id,name,tier,city}, products{_id,name,category,stock}",
      "task": "Create a TTL index so that documents in a 'sessions' collection auto-delete 30 minutes after their 'lastActive' field.",
      "solution": "db.sessions.createIndex({ lastActive: 1 }, { expireAfterSeconds: 1800 })",
      "explanation": "TTL index auto-removes documents once 'lastActive' + expireAfterSeconds has passed -- a background process checks this periodically (not instant to-the-second)."
    },
    {
      "id": 25,
      "section": "Indexing",
      "difficulty": "hard",

        let currentTopic = 'all';
        const reviewed = new Set();

        // Curated topic palette, cycled for any topics beyond the named ones
        const topicPalette = [
            { tab: 'bg-emerald-500', ring: 'ring-emerald-200 dark:ring-emerald-900/40', text: 'text-emerald-700 dark:text-emerald-400' },
            { tab: 'bg-indigo-500',  ring: 'ring-indigo-200 dark:ring-indigo-900/40',  text: 'text-indigo-700 dark:text-indigo-400' },
            { tab: 'bg-amber-500',   ring: 'ring-amber-200 dark:ring-amber-900/40',    text: 'text-amber-700 dark:text-amber-400' },
            { tab: 'bg-violet-500',  ring: 'ring-violet-200 dark:ring-violet-900/40',  text: 'text-violet-700 dark:text-violet-400' },
            { tab: 'bg-rose-500',    ring: 'ring-rose-200 dark:ring-rose-900/40',      text: 'text-rose-700 dark:text-rose-400' },
            { tab: 'bg-cyan-500',    ring: 'ring-cyan-200 dark:ring-cyan-900/40',      text: 'text-cyan-700 dark:text-cyan-400' },
            { tab: 'bg-orange-500',  ring: 'ring-orange-200 dark:ring-orange-900/40',  text: 'text-orange-700 dark:text-orange-400' },
            { tab: 'bg-teal-500',    ring: 'ring-teal-200 dark:ring-teal-900/40',      text: 'text-teal-700 dark:text-teal-400' },
        ];
        const topicColorMap = {};
        function colorForTopic(topic) {
            if (!topicColorMap[topic]) {
                const idx = Object.keys(topicColorMap).length % topicPalette.length;
                topicColorMap[topic] = topicPalette[idx];
            }
            return topicColorMap[topic];
        }

        const diffDot = {
            easy: 'bg-emerald-500',
            medium: 'bg-amber-500',
            hard: 'bg-rose-500'
        };

        // Initialize UI Elements
        function init() {
            document.getElementById('page-title').innerText = dataBank.title;
            document.getElementById('page-level').innerText = dataBank.note;
            document.getElementById('page-instructions').innerText = dataBank.note;
            document.getElementById('stat-total').innerText = dataBank.problems.length;
            document.getElementById('stat-topics').innerText = dataBank.sections.length;

            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').innerText = "☀️";
            }

            renderSchemaLegend();
            renderTopicTabs();
            filterQuestions();
        }

        // Render the sample schema reference cards (E-commerce / Social app / Chat app etc.)
        function renderSchemaLegend() {
            const container = document.getElementById('schema-legend');
            Object.entries(dataBank.sample_schemas || {}).forEach(([key, desc]) => {
                const [label, rest] = desc.split(/:\s(.+)/s);
                const row = document.createElement('div');
                row.className = "catalog-card rounded-lg px-4 py-2.5 flex flex-col sm:flex-row sm:items-baseline gap-1 sm:gap-3";
                row.innerHTML = `
                    <span class="font-mono text-[10px] uppercase tracking-widest text-emerald-700 dark:text-emerald-400 shrink-0 w-28">${label}</span>
                    <span class="font-mono text-xs text-slate-500 dark:text-slate-400 leading-relaxed">${rest || ''}</span>
                `;
                container.appendChild(row);
            });
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').innerText = isDark ? "☀️" : "🌙";
        }

        function renderTopicTabs() {
            const container = document.getElementById('topic-filters');
            dataBank.sections.forEach(topic => {
                colorForTopic(topic);
                const btn = document.createElement('button');
                btn.id = `tab-${topic.replace(/\s+/g, '-')}`;
                btn.className = "px-3 py-1.5 text-xs font-semibold rounded-md bg-[#FFFDF9] dark:bg-[#151B1F] border border-[var(--paper-line)] dark:border-[#263038] text-slate-600 dark:text-slate-400 hover:brightness-95 dark:hover:brightness-125 shadow-xs transition-all cursor-pointer font-mono";
                btn.innerText = topic;
                btn.onclick = () => selectTopic(topic);
                container.appendChild(btn);
            });
        }

        function selectTopic(topic) {
            currentTopic = topic;

            const allButtons = document.querySelectorAll('#topic-filters button');
            allButtons.forEach(btn => {
                btn.className = "px-3 py-1.5 text-xs font-semibold rounded-md bg-[#FFFDF9] dark:bg-[#151B1F] border border-[var(--paper-line)] dark:border-[#263038] text-slate-600 dark:text-slate-400 hover:brightness-95 dark:hover:brightness-125 shadow-xs transition-all cursor-pointer font-mono";
            });

            const activeId = topic === 'all' ? 'tab-all' : `tab-${topic.replace(/\s+/g, '-')}`;
            document.getElementById(activeId).className = "px-3 py-1.5 text-xs font-semibold rounded-md bg-[var(--ink)] dark:bg-emerald-600 text-white shadow-xs transition-all cursor-pointer font-mono";

            filterQuestions();
        }

        function filterQuestions() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('questions-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            const filtered = dataBank.problems.filter(q => {
                const matchesTopic = (currentTopic === 'all' || q.section === currentTopic);
                const haystack = `${q.task} ${q.solution} ${q.explanation || ''} ${q.scenario || ''}`.toLowerCase();
                const matchesSearch = haystack.includes(searchQuery);
                return matchesTopic && matchesSearch;
            });

            document.getElementById('stats-counter').innerText = `Showing ${filtered.length} of ${dataBank.problems.length} records`;
            emptyState.classList.toggle('hidden', filtered.length !== 0);

            filtered.forEach(q => {
                const colors = colorForTopic(q.section);
                const card = document.createElement('div');
                card.className = `catalog-card rounded-xl shadow-xs overflow-hidden flex flex-col justify-between transition-colors duration-200 relative pl-1.5`;

                const explanationHtml = q.explanation
                    ? `<p class="mt-2.5 pt-2.5 border-t border-white/10 text-[11px] text-emerald-200/70 leading-relaxed not-italic">${q.explanation}</p>`
                    : '';

                card.innerHTML = `
                    <span class="absolute left-0 top-0 bottom-0 w-1.5 ${colors.tab}"></span>
                    <div class="p-5 flex-1">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <span class="w-1.5 h-1.5 rounded-full ${diffDot[q.difficulty] || 'bg-slate-400'}"></span>
                                <span class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">${q.difficulty}</span>
                            </div>
                            <span class="font-mono text-[10px] text-slate-300 dark:text-slate-600">No. ${String(q.id).padStart(3, '0')}</span>
                        </div>
                        <p class="font-mono text-[10px] uppercase tracking-widest ${colors.text} mb-1.5">${q.section}</p>

                        ${q.scenario ? `<p class="text-[11px] text-slate-400 dark:text-slate-500 mb-2 leading-relaxed border-l-2 border-[var(--paper-line)] dark:border-[#263038] pl-2.5">${q.scenario}</p>` : ''}

                        <h3 class="font-display text-base font-medium text-[var(--ink)] dark:text-white leading-snug">
                            ${q.task}
                        </h3>
                    </div>

                    <div class="px-5 pb-5 pt-0">
                        <button onclick="toggleAnswer(${q.id})" class="text-xs font-semibold ${colors.text} hover:brightness-90 flex items-center gap-1.5 cursor-pointer select-none font-mono">
                            <span id="eye-icon-${q.id}">▸</span> <span id="btn-text-${q.id}">reveal solution</span>
                        </button>

                        <div id="answer-box-${q.id}" class="hidden mt-4 terminal-box text-xs p-3.5 rounded-lg leading-relaxed whitespace-pre-line font-mono">
<span class="text-slate-500">$</span> ${q.solution}${explanationHtml}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleAnswer(id) {
            const target = document.getElementById(`answer-box-${id}`);
            const text = document.getElementById(`btn-text-${id}`);
            const icon = document.getElementById(`eye-icon-${id}`);

            const isHidden = target.classList.contains('hidden') || target.style.display === 'none';

            if (isHidden) {
                target.classList.remove('hidden');
                target.style.display = 'block';
                target.classList.add('animate-unfold');
                text.innerText = "hide";
                icon.innerText = "▾";
                if (!reviewed.has(id)) {
                    reviewed.add(id);
                    document.getElementById('stat-reviewed').innerText = reviewed.size;
                }
            } else {
                target.style.display = 'none';
                text.innerText = "reveal";
                icon.innerText = "▸";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
