<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Output Practice — 100 Questions</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #11161d;
    --border: #232a34;
    --text: #d5dae2;
    --dim: #7b8493;
    --accent: #4fd1c5;
    --err: #ff6b6b;
    --code-bg: #0a0e13;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Consolas", "Menlo", monospace;
    padding: 24px 16px 80px;
  }
  header {
    max-width: 860px;
    margin: 0 auto 24px;
  }
  header h1 {
    font-size: 20px;
    margin: 0 0 4px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header p {
    color: var(--dim);
    font-size: 13px;
    margin: 0 0 16px;
  }
  .controls {
    max-width: 860px;
    margin: 0 auto 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  select, input[type="text"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .stat {
    color: var(--dim);
    font-size: 12px;
    margin-left: auto;
  }
  .grid {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  .card-head .id {
    color: var(--dim);
    font-size: 12px;
  }
  .card-head .cat {
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  pre.code {
    margin: 0;
    padding: 14px;
    background: var(--code-bg);
    font-size: 13px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre;
  }
  .actions {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
  }
  button.run {
    background: var(--accent);
    color: #05201d;
    border: none;
    font-family: inherit;
    font-weight: 600;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
  }
  button.run:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .running-note {
    color: var(--dim);
    font-size: 12px;
  }
  .console {
    display: none;
    padding: 10px 14px;
    background: #000;
    border-top: 1px solid var(--border);
    font-size: 13px;
    min-height: 20px;
  }
  .console.visible { display: block; }
  .console .line {
    color: #8fe3a8;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .console .line.error { color: var(--err); }
  .console .empty { color: var(--dim); font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>JS Output Practice — 100 Questions</h1>
  <p>Predict the output, then hit Run. Every snippet actually executes in your browser — the console below is real, not a hardcoded answer.</p>
</header>

  <select id="catFilter">
    <option value="">All categories</option>
  </select>
  <span class="stat" id="stat">0 / 0 run</span>
</div>

  { cat: "Misc", code: 'function test2() {\n  try {\n    return 1;\n  } finally {\n    return 2;\n  }\n}\nconsole.log(test2());' },
  { cat: "Misc", code: 'const map = new Map();\nmap.set("a", 1).set("b", 2);\nconsole.log(map.get("a"));\nconsole.log([...map.entries()]);\nconsole.log(map.size);' },
  { cat: "Misc", code: 'const set = new Set([1, 2, 2, 3, 3, 3]);\nconsole.log([...set]);\nconsole.log(set.size);' },
  { cat: "Misc", code: 'console.log(typeof Symbol());\nconst s1 = Symbol("x");\nconst s2 = Symbol("x");\nconsole.log(s1 === s2);' }
];

let ranCount = 0;
const grid = document.getElementById("grid");
const catFilter = document.getElementById("catFilter");
const stat = document.getElementById("stat");

const cats = [...new Set(questions.map(q => q.cat))];
cats.forEach(c => {
  const opt = document.createElement("option");
  opt.value = c;
  opt.textContent = c;
  catFilter.appendChild(opt);
});

function formatArg(a) {
  if (typeof a === "string") return a;
  if (a === undefined) return "undefined";
  try {
    if (a instanceof Error) return a.toString();
    return JSON.stringify(a, (k, v) => (typeof v === "bigint" ? v.toString() : v));
  } catch {
    return String(a);
  }
}

let activeOutputEl = null;
const nativeLog = console.log.bind(console);
console.log = (...args) => {
  nativeLog(...args);
  if (activeOutputEl) {
    const line = document.createElement("div");
    line.className = "line";
    line.textContent = args.map(formatArg).join(" ");
    activeOutputEl.appendChild(line);
  }
};

function buildCard(q, index) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.cat = q.cat;

  const head = document.createElement("div");
  head.className = "card-head";
  head.innerHTML = `<span class="id">Q${index + 1}</span><span class="cat">${q.cat}</span>`;
  card.appendChild(head);

  const pre = document.createElement("pre");
  pre.className = "code";
  pre.textContent = q.code;
  card.appendChild(pre);

  const actions = document.createElement("div");
  actions.className = "actions";
  const btn = document.createElement("button");
  btn.className = "run";
  btn.textContent = "Run";
  actions.appendChild(btn);
  card.appendChild(actions);

  const output = document.createElement("div");
  output.className = "console";
  card.appendChild(output);

  let hasRun = false;
  btn.addEventListener("click", async () => {
    output.classList.add("visible");
    output.innerHTML = "";
    btn.disabled = true;
    btn.textContent = "Running…";
    activeOutputEl = output;
    try {
      await eval("(async () => {\n" + q.code + "\n})()");
    } catch (e) {
      const line = document.createElement("div");
      line.className = "line error";
      line.textContent = "Uncaught " + (e && e.message ? e.message : e);
      output.appendChild(line);
    }
    await new Promise(r => setTimeout(r, 500));
    activeOutputEl = null;
    if (output.children.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "(no output)";
      output.appendChild(empty);
    }
    btn.disabled = false;
    btn.textContent = "Run again";
    if (!hasRun) {
      hasRun = true;
      ranCount++;
      stat.textContent = `${ranCount} / ${questions.length} run`;
    }
  });

  return card;
}

questions.forEach((q, i) => grid.appendChild(buildCard(q, i)));
stat.textContent = `0 / ${questions.length} run`;

catFilter.addEventListener("change", () => {
  const val = catFilter.value;
  document.querySelectorAll(".card").forEach(card => {
    card.style.display = !val || card.dataset.cat === val ? "" : "none";
  });
});
</script>
</body>
</html>
